<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background Circle -->
  <circle cx="64" cy="64" r="60" fill="#0A0A0C"/>
  
  <!-- Form/Document with checkmark -->
  <g transform="translate(64, 64)">
    <!-- Document/Form -->
    <rect x="-24" y="-30" width="48" height="60" rx="3" fill="#d2a843" stroke="#d2a843" stroke-width="1"/>
    
    <!-- Form lines -->
    <line x1="-18" y1="-20" x2="14" y2="-20" stroke="#0A0A0C" stroke-width="2" stroke-linecap="round"/>
    <line x1="-18" y1="-10" x2="14" y2="-10" stroke="#0A0A0C" stroke-width="2" stroke-linecap="round"/>
    <line x1="-18" y1="0" x2="14" y2="0" stroke="#0A0A0C" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Checkmark -->
    <path d="M -6 12 L 2 20 L 12 8" stroke="#0A0A0C" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>